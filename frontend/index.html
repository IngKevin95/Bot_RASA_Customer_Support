<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Banco Digital — Soporte</title>
  <link rel="stylesheet" href="css/chat.css" />
</head>
<body>

  <!-- Página de demostración -->
  <main class="hero">
    <h1>Banco Digital</h1>
    <p>Bienvenido al portal de banca en línea.<br>Haz clic en el botón de soporte para chatear con nuestro asistente.</p>
  </main>

  <!-- Widget de chat -->
  <button id="chat-toggle" aria-label="Abrir chat de soporte">
    <!-- Icono chat -->
    <svg class="icon-chat" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M20 2H4C2.9 2 2 2.9 2 4v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"/>
    </svg>
    <!-- Icono cerrar -->
    <svg class="icon-close" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
    </svg>
  </button>

  <div id="chat-panel" role="dialog" aria-label="Chat de soporte">
    <header class="chat-header">
      <div class="bot-avatar">BC</div>
      <div class="bot-info">
        <div class="bot-name">Asistente Virtual</div>
        <div class="bot-status">
          <span class="status-dot" aria-hidden="true"></span>
          <span class="status-label">En línea</span>
        </div>
      </div>
    </header>

    <div id="messages" role="log" aria-live="polite" aria-label="Conversación"></div>

    <div id="error-toast" role="alert" aria-live="assertive"></div>

    <div class="chat-input-area">
      <textarea
        id="msg-input"
        rows="1"
        placeholder="Escribe tu mensaje..."
        aria-label="Mensaje de chat"
        maxlength="500"
      ></textarea>
      <button id="send-btn" aria-label="Enviar mensaje">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </div>
  </div>

  <script src="js/chat.js"></script>
</body>
</html>
