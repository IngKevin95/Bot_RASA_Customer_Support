version: "3.9"

# Stack completo — ver docs/local-setup.md para instrucciones de uso.
# Inicio rapido: cp .env.example .env && cp .env.chatwoot.example .env.chatwoot && docker compose up --build

services:

  # ──────────────────────────────────────────
  # RASA Bot
  # ──────────────────────────────────────────
  action-server:
    build: .
    command: rasa run actions --port 5055
    ports:
      - "5055:5055"
    volumes:
      - ./actions:/app/actions
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
      - ESCALATION_PROVIDER=${ESCALATION_PROVIDER:-stub}
      - ESCALATION_QUEUE=${ESCALATION_QUEUE:-soporte_general}
      - CHATWOOT_URL=http://chatwoot:3000
      - CHATWOOT_API_TOKEN=${CHATWOOT_API_TOKEN:-}
      - CHATWOOT_ACCOUNT_ID=${CHATWOOT_ACCOUNT_ID:-}
      - CHATWOOT_INBOX_ID=${CHATWOOT_INBOX_ID:-}
      - GENESYS_CLIENT_ID=${GENESYS_CLIENT_ID:-}
      - GENESYS_CLIENT_SECRET=${GENESYS_CLIENT_SECRET:-}
      - GENESYS_ORG_ID=${GENESYS_ORG_ID:-mypurecloud.com}

  rasa:
    build: .
    command: >
      rasa run
        --enable-api
        --cors "*"
        --port 5005
        --endpoints endpoints.yml
        --credentials credentials.yml
    ports:
      - "5005:5005"
    volumes:
      - ./models:/app/models
    depends_on:
      - action-server
    environment:
      - PYTHONUNBUFFERED=1

  # ──────────────────────────────────────────
  # Backend API (FastAPI)
  # ──────────────────────────────────────────
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      - rasa
    env_file: .env
    environment:
      - RASA_URL=http://rasa:5005
      - ESCALATION_PROVIDER=${ESCALATION_PROVIDER:-stub}
      - ESCALATION_QUEUE=${ESCALATION_QUEUE:-soporte_general}
      - CHATWOOT_URL=http://chatwoot:3000
      - CHATWOOT_API_TOKEN=${CHATWOOT_API_TOKEN:-}
      - CHATWOOT_ACCOUNT_ID=${CHATWOOT_ACCOUNT_ID:-}
      - CHATWOOT_INBOX_ID=${CHATWOOT_INBOX_ID:-}
      - GENESYS_CLIENT_ID=${GENESYS_CLIENT_ID:-}
      - GENESYS_CLIENT_SECRET=${GENESYS_CLIENT_SECRET:-}
      - GENESYS_ORG_ID=${GENESYS_ORG_ID:-mypurecloud.com}
      - CORS_ORIGINS=["http://localhost","http://localhost:80"]

  # ──────────────────────────────────────────
  # Frontend (nginx)
  # ──────────────────────────────────────────
  frontend:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

  # ──────────────────────────────────────────
  # Chatwoot (escalacion demo)
  # ──────────────────────────────────────────
  chatwoot:
    image: chatwoot/chatwoot:latest
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis
    env_file: .env.chatwoot
    environment:
      - NODE_ENV=production
      - RAILS_ENV=production
      - DATABASE_URL=postgres://chatwoot:chatwoot@postgres:5432/chatwoot
      - REDIS_URL=redis://redis:6379
    command: bundle exec rails server -p 3000 -b 0.0.0.0

  postgres:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=chatwoot
      - POSTGRES_PASSWORD=chatwoot
      - POSTGRES_DB=chatwoot
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
