# Deploy a GCP Cloud Run
#
# PREREQUISITOS — leer docs/gcp-setup.md antes de activar este workflow.
#
# Secrets requeridos en Settings > Secrets and variables > Actions:
#   GCP_PROJECT_ID  — ID del proyecto GCP (ej: "mi-proyecto-123")
#   GCP_SA_KEY      — JSON completo de la clave del Service Account
#
# El workflow falla con "must specify exactly one of workload_identity_provider
# or credentials_json" cuando GCP_SA_KEY no esta configurado.
# Ver docs/gcp-setup.md para el paso a paso de creacion del SA y la clave.

name: Deploy to GCP Cloud Run

on:
  push:
    branches: [main]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  SERVICE: customer-support-bot
  IMAGE: gcr.io/${{ secrets.GCP_PROJECT_ID }}/customer-support-bot

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker --quiet

      - name: Train RASA model
        run: |
          pip install rasa==$(grep rasa== requirements.txt | cut -d= -f3)
          rasa train --fixed-model-name latest

      - name: Build Docker image
        run: docker build -t $IMAGE .

      - name: Push to Container Registry
        run: docker push $IMAGE

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy $SERVICE \
            --image $IMAGE \
            --platform managed \
            --region $REGION \
            --allow-unauthenticated \
            --memory 2Gi \
            --cpu 2 \
            --timeout 300 \
            --set-env-vars "GCP_PROJECT_ID=$PROJECT_ID"

      - name: Show service URL
        run: |
          echo "Deployed at:"
          gcloud run services describe $SERVICE \
            --region $REGION \
            --format 'value(status.url)'
